name: Deploy a GitHub Pages

# Se ejecuta en cada push a main (y se puede lanzar a mano desde la pestaña Actions).
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos que necesita el deploy a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez; no cancela el que esté en curso.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Preparar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Compilar el sitio (Vite)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir el resultado (carpeta dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar en Pages
        id: deployment
        uses: actions/deploy-pages@v4
